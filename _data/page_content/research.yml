masthead:
  kicker: Research
  title: 研究领域
  intro: 课题组的主要研究领域围绕三个方向展开，页面从展示型卡片调整为可点击、可继续下钻的结构。
section:
  kicker: Research Areas
  title: 核心研究方向
  intro: 每个方向均配置概要说明、配图以及可继续查看的论文、书籍或学位论文清单。
areas:
  - code: Area 01
    slug: lithic-technology
    title: 石器技术研究
    description: 揭示我国旧石器工业内部及工业之间的多样性，探索它们与世界其他地区石器工业的共性及差异性。
    image: /assets/uploads/docx-tl-homepage-0326/figure-07.jpeg
    image_alt: 石器技术研究配图
    link: /research/#lithic-technology
  - code: Area 02
    slug: hanshui-middle-yangtze
    title: 汉水流域与长江中游史前人类的石器技术与行为研究
    description: 关注区域遗址序列、技术演化与史前人类行为，结合汉水流域与长江中游材料建立长期比较框架。
    image: /assets/uploads/docx-tl-homepage-0326/figure-08.png
    image_alt: 汉水流域与长江中游研究配图
    link: /research/#hanshui-middle-yangtze
  - code: Area 03
    slug: south-china-southeast-asia
    title: 华南与东南亚古人类的技术与行为研究
    description: 通过华南与东南亚区域比较研究古人类技术与行为关系，逐步完善跨区域文化联系的解释框架。
    image: /assets/uploads/docx-tl-homepage-0326/figure-09.jpeg
    image_alt: 华南与东南亚研究配图
    link: /research/#south-china-southeast-asia
