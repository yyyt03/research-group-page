masthead:
  kicker: About
  title: 关于我们
  intro: 课题组主页将“关于实验室”和“关于我们”合并为统一入口，用于集中呈现实验室定位、学科方向与合作网络。
content:
  paragraphs:
    - 石器技术实验室以李英华教授及其课题组为核心，所属二级学科为先秦考古，持续围绕旧石器时代技术与行为研究展开教学、科研与国际合作。
    - 李英华教授及其课题组的研究领域主要包括石器技术研究、汉水流域与长江中游史前人类的石器技术与行为研究、华南与东南亚古人类的技术与行为研究。
    - 本课题组致力于考古学、历史学、人工智能、文化遗产和测绘等专业的跨学科协作，同时持续推进与欧洲、东南亚等地区高校和研究机构的国际交流与合作。
  image: /assets/uploads/docx-tl-homepage-0326/figure-05.png
