intro:
  kicker: 机构简介
  title: 研究定位与方法
  paragraphs:
    - 本站以考古课题组为核心，服务于研究中心式的信息展示需求，集中呈现研究方向、成员结构、项目进展与成果发布，形成长期维护的公开界面。
    - 当前建设重点包括石器技术研究、实验考古、汉水流域及长江中游旧石器研究与华南及东南亚区域比较等方向。
    - 课题组强调材料分析、实验复原与跨区域比较相结合，并持续推进与国内外研究机构的合作交流。
  image: /assets/uploads/site/index-lab.jpg
  image_alt: 研究中心空间展示图
