intro:
  kicker: About
  title: Technologie Lithique
  paragraphs:
    - 石器技术实验室以李英华教授及其课题组为核心，围绕石器技术研究、汉水流域与长江中游史前人类的石器技术与行为研究、华南与东南亚古人类的技术与行为研究等主题持续展开工作。
    - 本课题组所属二级学科为先秦考古，强调考古学、历史学、人工智能、文化遗产和测绘等专业的跨学科协作。
    - 课题组同时推进与欧洲、东南亚等地区高校和研究机构的国际交流与合作，逐步形成集课程、实验、项目与成果展示于一体的公开平台。
  image: /assets/uploads/docx-tl-homepage-0326/figure-04.jpeg
  image_alt: 首页 About 区块配图
