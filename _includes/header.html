<header class="lab-header" role="banner">
  <div class="wrapper lab-header__inner">
    <a class="lab-brand" rel="author" href="{{ '/' | relative_url }}">
      <span class="lab-brand__mark">A</span>
      <span class="lab-brand__text">{{ site.title }}</span>
    </a>

    <button class="lab-nav-toggle" type="button" aria-expanded="false" aria-label="切换导航菜单" data-nav-toggle>
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="lab-nav" aria-label="主导航">
      <ul class="lab-nav__list" data-nav-panel>
        {% for item in site.data.navigation.main %}
          {% assign current = false %}
          {% if page.url == item.url %}
            {% assign current = true %}
          {% endif %}
          <li>
            <a class="lab-nav__link{% if current %} is-current{% endif %}{% if forloop.last %} lab-nav__link--button{% endif %}" href="{{ item.url | relative_url }}"{% if current %} aria-current="page"{% endif %}>{{ item.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
