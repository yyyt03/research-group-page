title: Technologie Lithique
email: contact@example.com
description: >-
  石器技术实验室围绕旧石器时代技术学分析、三维重建与区域比较研究，持续建设开放的课题组主页。
baseurl: "/research-group-page"
url: "https://yyyt03.github.io"
lang: zh-CN
timezone: Asia/Shanghai
github_username: "yyyt03"
subtitle: 石器技术实验室
brand_eyebrow: Wuhan University Archaeology Lab
brand_mark: TL

theme: minima
plugins:
  - jekyll-feed

collections:
  members:
    output: true
    permalink: /members/:name/
  news:
    output: true
    permalink: /news/:name/
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: members
    values:
      layout: member
  - scope:
      path: ""
      type: news
    values:
      layout: news-item
  - scope:
      path: ""
      type: projects
    values:
      layout: project-item

exclude:
  - .jekyll-cache/
  - _site/
  - docs/
