---
layout: default
---
<article class="page-shell page-shell--member">
  <div class="member-profile">
    <div class="member-profile__hero">
      {% if page.photo %}
      <figure class="member-profile__media">
        <img src="{{ page.photo | relative_url }}" alt="{{ page.name }}" class="member-profile__image">
      </figure>
      {% endif %}
      <div class="member-profile__intro">
        <p class="section-kicker">团队成员</p>
        <h1 class="section-title section-title--left">{{ page.name }}</h1>
        <p class="member-profile__role">{{ page.role }}</p>
        {% if page.research %}
        <p class="member-profile__lead">{{ page.research }}</p>
        {% endif %}
        {% if page.email %}
        <p><a href="mailto:{{ page.email }}">{{ page.email }}</a></p>
        {% endif %}
      </div>
    </div>

    <div class="member-profile__body">
      {{ content }}
    </div>
  </div>
</article>
