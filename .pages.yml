media:
  input: assets/uploads
  output: /assets/uploads

settings:
  content:
    merge: true

content:
  - name: members
    label: 团队成员
    type: collection
    path: _members
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: name
        label: 姓名
        type: string
        required: true
      - name: role
        label: 职称/身份
        type: string
      - name: photo
        label: 照片
        type: image
        options:
          path: members
          extensions: [jpg, jpeg, png, webp]
      - name: research
        label: 研究方向
        type: text
      - name: email
        label: 邮箱
        type: string
      - name: order
        label: 排序
        type: number
      - name: discipline
        label: 所属学科
        type: string
      - name: specialty
        label: 专业特长
        type: string
      - name: body
        label: 详细介绍
        type: rich-text
        options:
          path: members
          extensions: [jpg, jpeg, png, webp, gif]

  - name: news
    label: 学术成果与动态
    type: collection
    path: _news
    format: yaml-frontmatter
    subfolders: false
    filename: "{year}-{month}-{day}-{primary}.md"
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 日期
        type: date
        required: true
      - name: cover
        label: 封面图
        type: image
        options:
          path: news
          extensions: [jpg, jpeg, png, webp]
      - name: summary
        label: 摘要
        type: text
      - name: body
        label: 正文（支持插图）
        type: rich-text
        options:
          path: news
          extensions: [jpg, jpeg, png, webp, gif]

  - name: projects
    label: 项目
    type: collection
    path: _projects
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: title
        label: 项目名称
        type: string
        required: true
      - name: period
        label: 周期
        type: string
      - name: leader
        label: 负责人
        type: string
      - name: summary
        label: 简介
        type: text
      - name: status
        label: 状态
        type: select
        options:
          values: [ongoing, completed]
      - name: body
        label: 详情
        type: rich-text
        options:
          path: projects
          extensions: [jpg, jpeg, png, webp, gif]

  - name: home_content
    label: 固定页-首页内容
    type: file
    path: _data/page_content/home.yml
    fields:
      - name: hero
        label: 首页主视觉
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 主标题
            type: string
          - name: lead
            label: 简介
            type: text
          - name: keywords
            label: 关键词
            type: string
            list: true
          - name: primary_button_text
            label: 主按钮文字
            type: string
          - name: primary_button_link
            label: 主按钮链接
            type: string
          - name: secondary_button_text
            label: 次按钮文字
            type: string
          - name: secondary_button_link
            label: 次按钮链接
            type: string
      - name: intro
        label: 机构简介区块
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: paragraphs
            label: 段落
            type: text
            list: true
          - name: image
            label: 配图
            type: image
            options:
              path: site
              extensions: [jpg, jpeg, png, webp]
          - name: image_alt
            label: 图片替代文本
            type: string
      - name: output_preview
        label: 首页项目与学术成果区块
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text
          - name: cards
            label: 卡片
            type: object
            list: true
            fields:
              - name: meta
                label: 分类
                type: string
              - name: title
                label: 标题
                type: string
              - name: text
                label: 说明
                type: text
              - name: link_text
                label: 按钮文字
                type: string
              - name: link
                label: 跳转链接
                type: string
      - name: members_section
        label: 首页成员区块
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text
          - name: more_link_text
            label: 更多按钮文字
            type: string
          - name: placeholder_mark
            label: 缺省头像文字
            type: string
      - name: contact_section
        label: 联系区块
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text
          - name: cards
            label: 联系卡片
            type: object
            list: true
            fields:
              - name: title
                label: 卡片标题
                type: string
              - name: text
                label: 卡片内容
                type: text

  - name: about_content
    label: 固定页-关于内容
    type: file
    path: _data/page_content/about.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: content
        label: 正文内容
        type: object
        fields:
          - name: paragraphs
            label: 段落
            type: text
            list: true
          - name: image
            label: 配图
            type: image
            options:
              path: site
              extensions: [jpg, jpeg, png, webp]
          - name: image_alt
            label: 图片替代文本
            type: string
      - name: stats
        label: 统计卡片
        type: object
        list: true
        fields:
          - name: value
            label: 数字
            type: number
          - name: label
            label: 说明
            type: string
          - name: accent
            label: 强调样式
            type: boolean

  - name: research_content
    label: 固定页-研究内容
    type: file
    path: _data/page_content/research.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: section
        label: 首页研究区块标题
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text
      - name: areas
        label: 研究方向卡片
        type: object
        list: true
        fields:
          - name: code
            label: 编号
            type: string
          - name: slug
            label: 锚点标识
            type: string
          - name: title
            label: 标题
            type: string
          - name: description
            label: 简介
            type: text
          - name: image
            label: 配图
            type: image
            options:
              path: site
              extensions: [jpg, jpeg, png, webp]
          - name: image_alt
            label: 图片替代文本
            type: string
          - name: link
            label: 跳转链接
            type: string
          - name: detail_intro
            label: 详情区简介
            type: text
          - name: panels
            label: 详情区面板
            type: object
            list: true
            fields:
              - name: title
                label: 面板标题
                type: string
              - name: entries
                label: 条目列表
                type: text
                list: true

  - name: contact_content
    label: 固定页-联系内容
    type: file
    path: _data/page_content/contact.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: cards
        label: 联系卡片
        type: object
        list: true
        fields:
          - name: title
            label: 卡片标题
            type: string
          - name: text
            label: 卡片内容
            type: text

  - name: outputs_content
    label: 固定页-项目与学术成果内容
    type: file
    path: _data/page_content/outputs.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: sections
        label: 页面分区文案
        type: object
        fields:
          - name: projects
            label: 项目分区
            type: object
            fields:
              - name: kicker
                label: 顶部小标题
                type: string
              - name: title
                label: 标题
                type: string
              - name: intro
                label: 简介
                type: text
              - name: leader_label
                label: 负责人标签
                type: string
          - name: books
            label: 书籍分区
            type: object
            fields:
              - name: kicker
                label: 顶部小标题
                type: string
              - name: title
                label: 标题
                type: string
              - name: intro
                label: 简介
                type: text
              - name: authors_label
                label: 作者标签
                type: string
              - name: publisher_label
                label: 出版社标签
                type: string
          - name: publications
            label: 论文入口分区
            type: object
            fields:
              - name: kicker
                label: 顶部小标题
                type: string
              - name: title
                label: 标题
                type: string
              - name: intro
                label: 简介
                type: text
              - name: link_text
                label: 跳转按钮文字
                type: string
              - name: link_url
                label: 跳转链接
                type: string
      - name: detail
        label: 项目详情页文案
        type: object
        fields:
          - name: project_kicker
            label: 页头小标题
            type: string
          - name: period_label
            label: 周期标签
            type: string
          - name: status_label
            label: 状态标签
            type: string
          - name: leader_label
            label: 负责人标签
            type: string
          - name: back_link_text
            label: 返回按钮文字
            type: string
      - name: books
        label: 书籍成果
        type: object
        list: true
        fields:
          - name: title
            label: 书名
            type: string
          - name: authors
            label: 作者
            type: string
          - name: publisher
            label: 出版社
            type: string
          - name: year
            label: 年份
            type: string
          - name: note
            label: 说明
            type: text
      - name: highlights
        label: 论文与归档说明
        type: object
        list: true
        fields:
          - name: title
            label: 标题
            type: string
          - name: text
            label: 说明
            type: text

  - name: news_content
    label: 固定页-学术成果与动态内容
    type: file
    path: _data/page_content/news.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: list
        label: 列表页文案
        type: object
        fields:
          - name: detail_link_text
            label: 详情按钮文字
            type: string
          - name: empty_text
            label: 空状态文案
            type: text
      - name: detail
        label: 详情页文案
        type: object
        fields:
          - name: kicker
            label: 页头小标题
            type: string
          - name: published_label
            label: 发布时间标签
            type: string
          - name: back_link_text
            label: 返回按钮文字
            type: string

  - name: members_content
    label: 固定页-成员内容
    type: file
    path: _data/page_content/members.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: list
        label: 列表页文案
        type: object
        fields:
          - name: empty_text
            label: 空状态文案
            type: text
          - name: placeholder_mark
            label: 缺省头像文字
            type: string
      - name: detail
        label: 详情页文案
        type: object
        fields:
          - name: kicker
            label: 页头小标题
            type: string
          - name: back_link_text
            label: 返回按钮文字
            type: string

  - name: courses_content
    label: 固定页-课程与实验内容
    type: file
    path: _data/page_content/courses.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: cards
        label: 课程卡片
        type: object
        list: true
        fields:
          - name: meta
            label: 分类
            type: string
          - name: title
            label: 标题
            type: string
          - name: label
            label: 属性标签
            type: string
          - name: value
            label: 属性内容
            type: string
          - name: text
            label: 说明
            type: text

  - name: site_content
    label: 固定内容-页脚文案
    type: file
    path: _data/page_content/site.yml
    fields:
      - name: footer
        label: 页脚
        type: object
        fields:
          - name: intro_text
            label: 页脚简介
            type: text
          - name: nav_heading
            label: 导航标题
            type: string
          - name: keywords_heading
            label: 关键词标题
            type: string
          - name: keywords
            label: 关键词
            type: string
            list: true
          - name: contact_link_text
            label: 联系链接文字
            type: string
          - name: about_link_text
            label: 关于链接文字
            type: string
