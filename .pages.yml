media:
  input: assets/uploads
  output: /assets/uploads

settings:
  content:
    merge: true

content:
  - name: research_areas
    label: 研究领域条目
    type: collection
    path: _research_areas
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: order
        label: 排序
        type: number
      - name: code
        label: 编号
        type: string
      - name: slug
        label: 锚点标识
        type: string
        required: true
      - name: description
        label: 简介
        type: text
      - name: image
        label: 配图
        type: image
        options:
          path: site
          extensions: [jpg, jpeg, png, webp]
      - name: image_alt
        label: 图片替代文本
        type: string
      - name: detail_intro
        label: 详情区简介
        type: text
      - name: panels
        label: 详情区块
        type: object
        list: true
        fields:
          - name: title
            label: 区块标题
            type: string
          - name: entries
            label: 条目列表
            type: text
            list: true

  - name: members
    label: 团队成员条目
    type: collection
    path: _members
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: name
        label: 姓名
        type: string
        required: true
      - name: role
        label: 职称/身份
        type: string
      - name: photo
        label: 照片
        type: image
        options:
          path: members
          extensions: [jpg, jpeg, png, webp]
      - name: research
        label: 研究方向
        type: text
      - name: email
        label: 邮箱
        type: string
      - name: order
        label: 排序
        type: number
      - name: discipline
        label: 所属学科
        type: string
      - name: specialty
        label: 专业特长
        type: string
      - name: body
        label: 详细介绍
        type: rich-text
        options:
          path: members
          extensions: [jpg, jpeg, png, webp, gif]

  - name: courses
    label: 课程与实验条目
    type: collection
    path: _courses
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: order
        label: 排序
        type: number
      - name: meta
        label: 分类
        type: string
      - name: label
        label: 属性标签
        type: string
      - name: value
        label: 属性内容
        type: string
      - name: image
        label: 封面图
        type: image
        options:
          path: courses
          extensions: [jpg, jpeg, png, webp]
      - name: image_alt
        label: 图片替代文本
        type: string
      - name: href
        label: 外部链接
        type: string
      - name: institution
        label: 建设单位
        type: string
      - name: instructor
        label: 负责人
        type: string
      - name: category
        label: 分类补充
        type: string
      - name: schedule
        label: 开课/开放时间
        type: string
      - name: workload
        label: 学习负荷
        type: string
      - name: certification
        label: 课程认证/级别
        type: string
      - name: language
        label: 语言
        type: string
      - name: keywords
        label: 关键词
        type: string
      - name: resource_url
        label: 资源链接
        type: string
      - name: text
        label: 列表简介
        type: text
      - name: summary
        label: 摘要
        type: text
      - name: outline
        label: 内容结构
        type: text
      - name: body
        label: 详情正文
        type: rich-text
        options:
          path: courses
          extensions: [jpg, jpeg, png, webp, gif]

  - name: projects
    label: 项目条目
    type: collection
    path: _projects
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: title
        label: 项目名称
        type: string
        required: true
      - name: order
        label: 排序
        type: number
      - name: period
        label: 周期
        type: string
      - name: leader
        label: 负责人
        type: string
      - name: summary
        label: 简介
        type: text
      - name: status
        label: 状态
        type: select
        options:
          values: [ongoing, completed]
      - name: body
        label: 详情
        type: rich-text
        options:
          path: projects
          extensions: [jpg, jpeg, png, webp, gif]

  - name: books
    label: 书籍成果条目
    type: collection
    path: _books
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: title
        label: 书名
        type: string
        required: true
      - name: order
        label: 排序
        type: number
      - name: authors
        label: 作者
        type: string
      - name: publisher
        label: 出版社
        type: string
      - name: year
        label: 年份
        type: string
      - name: cover
        label: 封面图
        type: image
        options:
          path: books
          extensions: [jpg, jpeg, png, webp]
      - name: cover_alt
        label: 图片替代文本
        type: string
      - name: isbn
        label: ISBN
        type: string
      - name: pages
        label: 页数
        type: string
      - name: price
        label: 定价
        type: string
      - name: link
        label: 外部链接
        type: string
      - name: note
        label: 书籍介绍
        type: text

  - name: news
    label: 学术成果条目
    type: collection
    path: _news
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 发布时间
        type: date
        options:
          format: yyyy-MM-dd
      - name: cover
        label: 封面图
        type: image
        options:
          path: news
          extensions: [jpg, jpeg, png, webp]
      - name: summary
        label: 摘要
        type: text
      - name: body
        label: 正文
        type: rich-text
        options:
          path: news
          extensions: [jpg, jpeg, png, webp, gif]

  - name: output_highlights
    label: 成果说明条目
    type: collection
    path: _output_highlights
    format: yaml-frontmatter
    subfolders: false
    filename: "{primary}.md"
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: order
        label: 排序
        type: number
      - name: text
        label: 说明
        type: text

  - name: home_content
    label: 首页
    type: file
    path: _data/page_content/home.yml
    fields:
      - name: hero
        label: 主视觉
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 主标题
            type: string
          - name: lead
            label: 简介
            type: text
          - name: keywords
            label: 关键词
            type: string
            list: true
          - name: primary_button_text
            label: 主按钮文字
            type: string
          - name: primary_button_link
            label: 主按钮链接
            type: string
          - name: secondary_button_text
            label: 次按钮文字
            type: string
          - name: secondary_button_link
            label: 次按钮链接
            type: string
      - name: intro
        label: 关于区块
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: paragraphs
            label: 段落
            type: text
            list: true
          - name: image
            label: 配图
            type: image
            options:
              path: site
              extensions: [jpg, jpeg, png, webp]
          - name: image_alt
            label: 图片替代文本
            type: string
      - name: output_preview
        label: 项目与学术成果预览
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text
          - name: cards
            label: 预览卡片
            type: object
            list: true
            fields:
              - name: meta
                label: 分类
                type: string
              - name: title
                label: 标题
                type: string
              - name: text
                label: 说明
                type: text
              - name: link_text
                label: 按钮文字
                type: string
              - name: link
                label: 跳转链接
                type: string
      - name: members_section
        label: 团队成员预览
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text
          - name: more_link_text
            label: 更多按钮文字
            type: string
          - name: placeholder_mark
            label: 缺省头像文字
            type: string
      - name: contact_section
        label: 联系区块
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text
          - name: cards
            label: 联系卡片
            type: object
            list: true
            fields:
              - name: title
                label: 卡片标题
                type: string
              - name: text
                label: 卡片内容
                type: text

  - name: about_content
    label: 关于我们
    type: file
    path: _data/page_content/about.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: content
        label: 正文内容
        type: object
        fields:
          - name: paragraphs
            label: 段落
            type: text
            list: true
          - name: image
            label: 配图
            type: image
            options:
              path: site
              extensions: [jpg, jpeg, png, webp]
          - name: image_alt
            label: 图片替代文本
            type: string
      - name: stats
        label: 统计卡片
        type: object
        list: true
        fields:
          - name: value
            label: 数字
            type: number
          - name: label
            label: 说明
            type: string
          - name: accent
            label: 强调样式
            type: boolean

  - name: research_content
    label: 研究领域页面文案
    type: file
    path: _data/page_content/research.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: section
        label: 首页研究区块
        type: object
        fields:
          - name: kicker
            label: 小标题
            type: string
          - name: title
            label: 标题
            type: string
          - name: intro
            label: 简介
            type: text

  - name: members_content
    label: 团队成员页面文案
    type: file
    path: _data/page_content/members.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: list
        label: 列表页文案
        type: object
        fields:
          - name: empty_text
            label: 空状态文案
            type: text
          - name: placeholder_mark
            label: 缺省头像文字
            type: string
      - name: detail
        label: 详情页文案
        type: object
        fields:
          - name: kicker
            label: 页头小标题
            type: string
          - name: back_link_text
            label: 返回按钮文字
            type: string

  - name: courses_content
    label: 课程与实验页面文案
    type: file
    path: _data/page_content/courses.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text

  - name: news_content
    label: 学术成果页面文案
    type: file
    path: _data/page_content/news.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: list
        label: 列表页文案
        type: object
        fields:
          - name: detail_link_text
            label: 详情链接文字
            type: string
          - name: empty_text
            label: 空状态文案
            type: text
      - name: detail
        label: 详情页文案
        type: object
        fields:
          - name: kicker
            label: 页头小标题
            type: string
          - name: published_label
            label: 发布时间标签
            type: string
          - name: back_link_text
            label: 返回按钮文字
            type: string

  - name: outputs_content
    label: 项目与学术成果页面文案
    type: file
    path: _data/page_content/outputs.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: sections
        label: 页面分区文案
        type: object
        fields:
          - name: projects
            label: 项目分区
            type: object
            fields:
              - name: kicker
                label: 顶部小标题
                type: string
              - name: title
                label: 标题
                type: string
              - name: intro
                label: 简介
                type: text
              - name: leader_label
                label: 负责人标签
                type: string
          - name: books
            label: 书籍分区
            type: object
            fields:
              - name: kicker
                label: 顶部小标题
                type: string
              - name: title
                label: 标题
                type: string
              - name: intro
                label: 简介
                type: text
              - name: authors_label
                label: 作者标签
                type: string
              - name: publisher_label
                label: 出版社标签
                type: string
          - name: publications
            label: 论文入口分区
            type: object
            fields:
              - name: kicker
                label: 顶部小标题
                type: string
              - name: title
                label: 标题
                type: string
              - name: intro
                label: 简介
                type: text
              - name: link_text
                label: 跳转按钮文字
                type: string
              - name: link_url
                label: 跳转链接
                type: string
      - name: detail
        label: 项目详情页文案
        type: object
        fields:
          - name: project_kicker
            label: 页头小标题
            type: string
          - name: period_label
            label: 周期标签
            type: string
          - name: status_label
            label: 状态标签
            type: string
          - name: leader_label
            label: 负责人标签
            type: string
          - name: back_link_text
            label: 返回按钮文字
            type: string

  - name: site_content
    label: 全站页脚文案
    type: file
    path: _data/page_content/site.yml
    fields:
      - name: footer
        label: 页脚
        type: object
        fields:
          - name: intro_text
            label: 页脚简介
            type: text
          - name: nav_heading
            label: 导航标题
            type: string
          - name: keywords_heading
            label: 关键词标题
            type: string
          - name: keywords
            label: 关键词
            type: string
            list: true
          - name: contact_link_text
            label: 联系链接文字
            type: string
          - name: about_link_text
            label: 关于链接文字
            type: string

  - name: contact_content
    label: 联系方式页面文案
    type: file
    path: _data/page_content/contact.yml
    fields:
      - name: masthead
        label: 页头
        type: object
        fields:
          - name: kicker
            label: 顶部小标题
            type: string
          - name: title
            label: 页面标题
            type: string
          - name: intro
            label: 页面简介
            type: text
      - name: cards
        label: 联系卡片
        type: object
        list: true
        fields:
          - name: title
            label: 卡片标题
            type: string
          - name: text
            label: 卡片内容
            type: text

  - name: navigation
    label: 主导航
    type: file
    path: _data/navigation.yml
    fields:
      - name: main
        label: 导航项
        type: object
        list: true
        fields:
          - name: title
            label: 名称
            type: string
          - name: url
            label: 链接
            type: string
